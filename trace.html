<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trace the Shape</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    text-align: center;
    color: white;
}

#map {
    height: 500px;
    width: 90%;
    margin: 20px auto;
    border-radius: 15px;
    border: 3px solid #00c9a7;
}

input {
    padding: 10px;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #00c9a7;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* MODAL BACKGROUND */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
}

/* MODAL BOX */
.modal-content {
    background: linear-gradient(135deg, #00c9a7, #92fe9d);
    margin: 12% auto;
    padding: 30px;
    width: 320px;
    border-radius: 15px;
    text-align: center;
    color: #003333;
    animation: popUp 0.4s ease;
}

/* BUTTONS */
.modal-content button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #003333;
    color: white;
    cursor: pointer;
}

/* ANIMATION */
@keyframes popUp {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

#map {
    height: 500px;
    width: 100%;
    cursor: crosshair;
}
</style>
</head>

<body>

<h1>Plot the Points 🌱</h1>

<div id="map"></div>

<input type="text" id="answer" placeholder="Enter your answer">
<br>
<button onclick="checkAnswer()">Submit</button>

<!-- RESULT MODAL -->
<div id="resultModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle"></h2>
        <p id="modalMessage"></p>

        <button id="nextBtn" onclick="goToNext()" style="display:none;">
            🚀 Enter Next Round
        </button>

        <button onclick="closeModal()">Try Again</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map', {
    dragging: false,
    zoomControl: false,
    scrollWheelZoom: false,
    doubleClickZoom: false,
    boxZoom: false,
    keyboard: false,
    tap: false,
    touchZoom: false
}).setView([30, 20], 2);

// Load tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
}).addTo(map);


// ================== MARKERS ==================

let markers = [];

map.on('click', function(e) {

    let clicked = e.latlng;

    // Check if near marker → remove
    let foundIndex = markers.findIndex(m => {
        return map.distance(m.getLatLng(), clicked) < 200000;
    });

    if (foundIndex !== -1) {
        map.removeLayer(markers[foundIndex]);
        markers.splice(foundIndex, 1);
    } else {
        let marker = L.circleMarker(clicked, {
            radius: 7,
            color: "#FFD700",
            fillColor: "#FFD700",
            fillOpacity: 1
        }).addTo(map);

        markers.push(marker);
    }
});


// ================== FREE DRAWING ==================

let drawnLines = [];
let currentLine = null;
let isDrawing = false;

// Start drawing
map.on('mousedown', function(e) {
    isDrawing = true;

    currentLine = L.polyline([e.latlng], {
        color: "yellow",
        weight: 4
    }).addTo(map);
});

// Draw
map.on('mousemove', function(e) {
    if (!isDrawing) return;

    currentLine.addLatLng(e.latlng);
});

// Stop drawing
map.on('mouseup', function() {
    if (currentLine) {
        drawnLines.push(currentLine);
        currentLine = null;
    }
    isDrawing = false;
});


// ================== UNDO DRAWING ==================

map.on('contextmenu', function() {  // Right-click to undo
    if (drawnLines.length > 0) {
        let lastLine = drawnLines.pop();
        map.removeLayer(lastLine);
    }
});


// ================== ANSWER SYSTEM ==================

window.checkAnswer = function () {
    const ans = document.getElementById("answer").value.trim();

    const modal = document.getElementById("resultModal");
    const title = document.getElementById("modalTitle");
    const message = document.getElementById("modalMessage");
    const nextBtn = document.getElementById("nextBtn");

    modal.style.display = "block";

    if (ans === "W") {
        title.innerText = "🎉 Correct!";
        message.innerText = "You decoded the Earth’s secret 🌍✨";
        nextBtn.style.display = "inline-block";
    } else {
        title.innerText = "❌ Not Quite!";
        message.innerText = "The Earth says… try again 😄";
        nextBtn.style.display = "none";
    }
};

function closeModal() {
    document.getElementById("resultModal").style.display = "none";
}

function goToNext() {
    window.location.href = "next.html";
}
</script>

</body>
</html>
